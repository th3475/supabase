<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Панель статусов Supabase</title>
<style>
body {
    font-family: sans-serif;
    background: #f4f9ff;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px;
}

#myInfo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
}

.user-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 2px solid #007bff;
}

#statusPanel {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
}

.status-btn {
    padding: 5px 10px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    color: white;
    font-weight: bold;
    font-size: 13px;
}

.status-btn.playing { background: #4CAF50; }
.status-btn.resting { background: #2196F3; }
.status-btn.sleeping { background: #9C27B0; }
.status-btn.busy { background: #f44336; }

#usersList {
    width: 300px;
    background: white;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

.user-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px;
    border-bottom: 1px solid #eee;
}

.user-item:last-child {
    border-bottom: none;
}

.status-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    display: inline-block;
}
</style>
</head>
<body>

<h2>Моя панель статусов</h2>
<div id="myInfo">
    <img id="myAvatar" class="user-avatar" src="">
    <span id="myName">Загрузка...</span>
</div>
<div id="statusPanel"></div>

<h3>Все пользователи:</h3>
<div id="usersList"></div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

// =================== Supabase ===================
const URL = 'https://rncerhgizyjhovbdpqnl.supabase.co';
const KEY = 'sb_publishable_Thtft56uBeaKf8rymdIFTe_00HMJ5yh';
const supabase = createClient(URL, KEY);

// =================== Фиксированный пользователь ===================
const MY_ID = '4hc5694e-89f8-47d9-9b60-2d3hd2439122';

// =================== Панель статусов ===================
const statuses = [
    { text: "Играю", class: "playing" },
    { text: "Отдыхаю", class: "resting" },
    { text: "Сплю", class: "sleeping" },
    { text: "Не беспокоить", class: "busy" }
];

function renderStatusPanel() {
    const panel = document.getElementById("statusPanel");
    panel.innerHTML = statuses.map(s => `
        <button class="status-btn ${s.class}" onclick="changeStatus('${s.text}')">
            ${s.text}
        </button>
    `).join('');
}

// =================== Изменение статуса ===================
window.changeStatus = async (text) => {
    const { error } = await supabase
        .from('profiles')
        .update({ status: text })
        .eq('id', MY_ID);

    if(error) {
        console.error(error);
        alert("Ошибка! Проверьте RLS политики в Supabase.");
    } else {
        fetchGroup();
    }
}

// =================== Загрузка пользователей ===================
async function fetchGroup() {
    const { data, error } = await supabase
        .from('profiles')
        .select('*')
        .order('username', { ascending: true });

    if(error) return console.error(error);

    // Текущий пользователь
    const me = data.find(u => u.id === MY_ID);
    if(me) {
        document.getElementById("myName").innerText = me.username;
        document.getElementById("myAvatar").src = me.avatar_url || '';
    }

    // Список всех пользователей
    const list = document.getElementById("usersList");
    list.innerHTML = data.map(user => {
        // Локально задаем цвет статуса
        let color = '#666';
        if(user.status === 'Играю') color = '#4CAF50';
        else if(user.status === 'Отдыхаю') color = '#2196F3';
        else if(user.status === 'Сплю') color = '#9C27B0';
        else if(user.status === 'Не беспокоить') color = '#f44336';

        return `
        <div class="user-item">
            <img src="${user.avatar_url || ''}" class="user-avatar">
            <span>${user.username}</span>
            <span class="status-dot" style="background:${color}"></span>
            <span>${user.status || 'Не задан'}</span>
        </div>
        `;
    }).join('');
}

// =================== Инициализация ===================
renderStatusPanel();
fetchGroup();
setInterval(fetchGroup, 5000);

</script>
</body>
</html>
