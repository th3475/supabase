<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Панель статусов Supabase</title>
<style>
body {
    font-family: sans-serif;
    background: #f4f9ff;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px;
}

#myInfo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
}

.user-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 2px solid #007bff;
}

#statusPanel {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
}

.status-btn {
    padding: 5px 10px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    color: white;
    font-weight: bold;
    font-size: 13px;
}

.status-btn.playing { background: #4CAF50; }
.status-btn.resting { background: #2196F3; }
.status-btn.sleeping { background: #9C27B0; }
.status-btn.busy { background: #f44336; }

#usersList {
    width: 300px;
    background: white;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

.user-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px;
    border-bottom: 1px solid #eee;
}

.user-item:last-child {
    border-bottom: none;
}

.status-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    display: inline-block;
}

/* Кнопка входа */
#googleLoginBtn {
    margin-bottom: 15px;
    padding: 8px 12px;
    font-weight: bold;
    cursor: pointer;
    background: #DB4437;
    color: white;
    border: none;
    border-radius: 5px;
}
</style>
</head>
<body>

<h2>Моя панель статусов</h2>

<button id="googleLoginBtn">Войти через Google</button>

<div id="myInfo" style="display:none;">
    <img id="myAvatar" class="user-avatar" src="">
    <span id="myName">Загрузка...</span>
</div>

<div id="statusPanel"></div>

<h3>Все пользователи:</h3>
<div id="usersList"></div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

// =================== Supabase ===================
const URL = 'https://juqbbjgxpggtnjoybszb.supabase.co';
const KEY = 'sb_publishable_XrLZEfrdhxrcGPN_XR1_5A_p_oq9Mqp';
const supabase = createClient(URL, KEY);

// =================== Панель статусов ===================
const statuses = [
    { text: "Играю", class: "playing", color: "#4CAF50" },
    { text: "Отдыхаю", class: "resting", color: "#2196F3" },
    { text: "Сплю", class: "sleeping", color: "#9C27B0" },
    { text: "Не беспокоить", class: "busy", color: "#f44336" }
];

function renderStatusPanel() {
    const panel = document.getElementById("statusPanel");
    panel.innerHTML = statuses.map(s => `
        <button class="status-btn ${s.class}" onclick="changeStatus('${s.text}', '${s.color}')">
            ${s.text}
        </button>
    `).join('');
}

// =================== Текущий пользователь ===================
let currentUser = null;

// =================== Вход через Google ===================
const loginBtn = document.getElementById('googleLoginBtn');

loginBtn.onclick = async () => {
    const { error } = await supabase.auth.signInWithOAuth({
        provider: 'google',
        options: {
            redirectTo: window.location.href // после входа возвращаемся на эту страницу
        }
    });
    if(error) console.error('Ошибка входа через Google:', error);
};

// Отслеживаем изменения авторизации
supabase.auth.onAuthStateChange(async (event, session) => {
    currentUser = session?.user || null;

    if(currentUser){
        // Показываем блок с информацией
        document.getElementById('myInfo').style.display = 'flex';
        loginBtn.style.display = 'none'; // прячем кнопку входа

        // Если пользователя ещё нет в таблице, создаём запись
        await supabase.from('profiles').upsert({
            id: currentUser.id,
            username: currentUser.user_metadata.full_name || currentUser.email,
            avatar_url: currentUser.user_metadata.avatar_url || ''
        });

        fetchGroup();
    } else {
        document.getElementById('myInfo').style.display = 'none';
        loginBtn.style.display = 'inline-block';
    }
});

// =================== Изменение статуса ===================
window.changeStatus = async (text, color) => {
    if(!currentUser) return alert("Сначала войдите через Google!");

    const { error } = await supabase
        .from('profiles')
        .update({ status: text, color: color })
        .eq('id', currentUser.id);

    if(error) {
        console.error(error);
        alert("Ошибка! Проверьте RLS политики в Supabase.");
    } else {
        fetchGroup(); // обновляем список
    }
}

// =================== Загрузка пользователей ===================
async function fetchGroup() {
    const { data, error } = await supabase
        .from('profiles')
        .select('*')
        .order('username', { ascending: true });

    if(error) return console.error(error);

    const me = currentUser ? data.find(u => u.id === currentUser.id) : null;
    if(me){
        document.getElementById("myName").innerText = me.username;
        document.getElementById("myAvatar").src = me.avatar_url || '';
    }

    const list = document.getElementById("usersList");
    list.innerHTML = data.map(user => `
        <div class="user-item">
            <img src="${user.avatar_url || ''}" class="user-avatar">
            <span>${user.username}</span>
            <span class="status-dot" style="background:${user.color || '#666'}"></span>
            <span>${user.status || 'Не задан'}</span>
        </div>
    `).join('');
}

// =================== Инициализация ===================
renderStatusPanel();
fetchGroup();
setInterval(fetchGroup, 5000);

</script>
</body>
</html>
